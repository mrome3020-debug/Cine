<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validación</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            display: flex;
            max-width: 800px;
            width: 100%;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 0 10px rgb(3, 9, 46);
            overflow: hidden;
        }
        .message {
            flex: 1;
            padding: 40px;
            background-color: rgb(3, 9, 46);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .message p {
            font-size: 18px;
            color: #ffffff;
            line-height: 1.5;
        }
        .form-container {
            flex: 1;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .form-container h2 {
            text-align: center;
            margin-bottom: 20px;
            color: rgb(3, 9, 46);
        }
        .error {
            margin-bottom: 12px;
            color: #b31212;
            font-weight: bold;
            text-align: center;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #ffffff;
        }
        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ffffff;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .form-group input:focus {
            border-color: #007bff;
            outline: none;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="message">
            <p>El acceso de Administrador está restringido a personas que ocupen el cargo de manera oficial, todo acceso sin permiso previo será ilegal.</p>
        </div>
        <div class="form-container">
            <h2>Ingreso de Administrador</h2>
            {% if error %}
            <div class="error">{{ error }}</div>
            {% endif %}
            <form action="/validar_admin" method="post">
                <div class="form-group">
                    <label for="usuario">Usuario:</label>
                    <input type="text" id="usuario" name="usuario" required>
                </div>
                <div class="form-group">
                    <label for="contraseña">Contraseña:</label>
                    <input type="password" id="contraseña" name="contraseña" required>
                </div>
                <button type="submit">Ingresar</button>
            </form>
        </div>
    </div>
</body>
</html>
