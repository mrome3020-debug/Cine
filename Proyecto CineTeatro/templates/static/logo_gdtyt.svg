<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Escudo estilizado con colores de Tucumán -->
  <defs>
    <linearGradient id="escudoGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a4d8f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f2d43;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Escudo -->
  <path d="M 50 10 L 70 25 L 70 55 Q 50 75 50 75 Q 30 55 30 25 Z" fill="url(#escudoGradient)" stroke="#ffffff" stroke-width="1.5"/>
  
  <!-- Franja dorada/dorada típica de gobernación -->
  <rect x="35" y="35" width="30" height="8" fill="#d4af37" opacity="0.9"/>
  
  <!-- Letras GdTyT simplificadas -->
  <text x="50" y="50" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle" dominant-baseline="middle">G</text>
  
  <!-- Decoración de estrellas pequeñas -->
  <circle cx="40" cy="28" r="2" fill="#d4af37"/>
  <circle cx="60" cy="28" r="2" fill="#d4af37"/>
  <circle cx="40" cy="65" r="2" fill="#d4af37"/>
  <circle cx="60" cy="65" r="2" fill="#d4af37"/>
</svg>
